<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Saved Itinerary — AI Trip Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --cyan: #06b6d4;
      --cyan2: #22d3ee;
      --bg: #060d1f;
      --card: #0d1b33;
      --border: rgba(6,182,212,0.15);
      --border-soft: rgba(255,255,255,0.06);
      --muted: #64748b;
      --muted2: #94a3b8;
      --text: #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    
    nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 48px; background: rgba(6,13,31,0.97); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 8px; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 18px; color: var(--cyan); text-decoration: none; }

    .main-container { max-width: 900px; margin: 40px auto; width: 95%; flex: 1; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--muted2); text-decoration: none; font-size: 14px; margin-bottom: 24px; transition: color 0.2s; }
    .back-link:hover { color: var(--cyan); }

    .itin-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    
    .itin-header { margin-bottom: 40px; border-bottom: 1px solid var(--border-soft); padding-bottom: 30px; }
    .itin-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; color: var(--cyan); margin-bottom: 12px; }
    .itin-title { font-family: 'Outfit', sans-serif; font-size: 48px; font-weight: 900; color: #fff; line-height: 1.1; margin-bottom: 16px; }
    .itin-meta { font-size: 14px; color: var(--muted2); display: flex; gap: 20px; }

    /* Markdown Styling (Consistent with itinerary.html) */
    #content-area { line-height: 1.8; color: #cbd5e1; font-size: 15px; }
    #content-area h2 { color: var(--cyan2); font-size: 26px; border-bottom: 1px solid var(--border); margin: 56px 0 24px; padding-bottom: 12px; font-family: 'Outfit', sans-serif; font-weight: 800; }
    #content-area h3 { color: #fff; font-size: 16px; text-transform: uppercase; letter-spacing: 0.15em; margin: 32px 0 16px; border-left: 3px solid var(--cyan); padding-left: 12px; }
    #content-area ul { margin: 20px 0 30px 10px; list-style: none; }
    #content-area li { position: relative; padding-left: 28px; margin-bottom: 14px; }
    #content-area ul li::before { content: ""; position: absolute; left: 0; top: 10px; width: 6px; height: 6px; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); border-radius: 2px; }
    
    #content-area table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 32px 0; background: rgba(13, 27, 51, 0.4); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    #content-area th { background: rgba(6, 182, 212, 0.15); color: var(--cyan2); padding: 16px 20px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid var(--border); }
    #content-area td { padding: 16px 20px; border-bottom: 1px solid var(--border-soft); font-size: 14px; color: #cbd5e1; }
    #content-area tr:last-child td { border-bottom: none; }

    .action-footer { display: flex; justify-content: center; gap: 16px; margin-top: 40px; margin-bottom: 60px; }
    .btn { padding: 14px 28px; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: #fff; transition: 0.3s; font-family: 'Outfit', sans-serif; text-transform: uppercase; }
    .btn-print { background: linear-gradient(135deg, var(--cyan), var(--cyan2)); color: #060d1f; border: none; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }

    @media print {
      nav, .back-link, .action-footer { display: none; }
      body { background: #fff; color: #000; }
      .itin-card { border: none; box-shadow: none; padding: 0; color: #000; }
      .itin-title, #content-area h2, #content-area h3 { color: #000; }
      #content-area table { background: #fff; border: 1px solid #000; }
      #content-area th { background: #eee; color: #000; }
      #content-area td { border-bottom: 1px solid #eee; color: #000; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">✈️ AI Trip Planner</a>
  </nav>

  <div class="main-container">
    <a href="dashboard.html" class="back-link">← Back to Dashboard</a>

    <div class="itin-card">
      <div class="itin-header">
        <div class="itin-eyebrow" id="view-eyebrow">Archived Itinerary</div>
        <h1 class="itin-title" id="view-title">Destination</h1>
        <div class="itin-meta">
          <span id="view-origin"></span>
          <span id="view-date"></span>
        </div>
      </div>

      <div id="content-area"></div>
    </div>

    <div class="action-footer">
      <button class="btn btn-print" onclick="window.print()">🖨️ Save as PDF</button>
      <button class="btn" onclick="copyContent()">📋 Copy Markdown</button>
    </div>
  </div>

  <script>
    window.onload = () => {
      const trip = JSON.parse(localStorage.getItem('viewingSavedTrip'));
      
      if (!trip) {
        alert("No trip data found!");
        window.location.href = 'dashboard.html';
        return;
      }

      // Populate Headings
      document.getElementById('view-title').textContent = trip.destination;
      document.getElementById('view-eyebrow').textContent = `${trip.days}-Day Tactical Plan`;
      document.getElementById('view-origin').textContent = `🏠 From: ${trip.origin}`;
      document.getElementById('view-date').textContent = `📅 Saved on: ${trip.timestamp}`;

      // Render Content
      const contentArea = document.getElementById('content-area');
      contentArea.innerHTML = marked.parse(trip.content);
    };

    function copyContent() {
      const trip = JSON.parse(localStorage.getItem('viewingSavedTrip'));
      navigator.clipboard.writeText(trip.content).then(() => alert('Copied to clipboard!'));
    }
  </script>
</body>
</html>
